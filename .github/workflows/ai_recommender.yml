name: AI Recommender (senior PM desk note)

on:
  schedule:
    # Taipei 08:23 weekdays  =  UTC 00:23
    # Off-the-hour minute per memo §GITHUB ACTIONS — integer/30 are crowded.
    # Picked before TW open (09:00) and well before US pre-market push (21:07 TPE).
    - cron: '23 0 * * 1-5'
  workflow_dispatch:          # manual run from the Actions tab
    inputs:
      dry_run:
        description: 'Dry run (skip Claude/Supabase/Telegram, print payload)'
        required: false
        default: 'false'

concurrency:
  group: ai-recommender
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALPACA_API_KEY_ID:        ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY:    ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_PAPER:             'true'
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      AI_RECOMMENDER_MODEL:     'claude-sonnet-4-6'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (slim — runner does not need Streamlit stack)
        run: |
          python -m pip install --upgrade pip
          pip install \
            anthropic \
            supabase \
            alpaca-py \
            yfinance \
            pandas \
            requests

      - name: Run recommender
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python ai_recommender.py --dry-run
          else
            python ai_recommender.py
          fi

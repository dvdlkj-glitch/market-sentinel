name: AI Recommender Review (outcome tracker + scorecard)

on:
  schedule:
    # Taipei 06:27 next day = UTC 22:27, after US close (20:00 UTC standard /
    # 21:00 UTC during EDT) plus a safety margin for yfinance to settle.
    # Off-the-hour minute per memo §GITHUB ACTIONS.
    - cron: '27 22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: ai-recommender-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (slim)
        run: |
          python -m pip install --upgrade pip
          pip install supabase yfinance pandas

      - name: Run outcome review + scorecard
        run: python ai_recommender_review.py

name: Prefetch Supply Chain Focus Snapshots

on:
  workflow_dispatch:
    inputs:
      keys:
        description: Optional comma-separated supply-chain keys
        required: false
        type: string
      period:
        description: Optional market period override, for example 1y
        required: false
        type: string
      interval:
        description: Optional market interval override, for example 1d
        required: false
        type: string
  schedule:
    - cron: "24 8 * * 1-5"
    - cron: "54 10 * * 1-5"

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SUPPLY_CHAIN_SNAPSHOT_TABLE: ${{ vars.SUPABASE_SUPPLY_CHAIN_SNAPSHOT_TABLE }}
      SUPPLY_CHAIN_SNAPSHOT_KEYS: ${{ github.event.inputs.keys || vars.SUPPLY_CHAIN_SNAPSHOT_KEYS }}
      PREFETCH_PERIOD: ${{ github.event.inputs.period }}
      PREFETCH_INTERVAL: ${{ github.event.inputs.interval }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prefetch supply chain focus snapshots
        run: >
          python scripts/prefetch_supply_chain_focus_snapshots.py
          --period "${PREFETCH_PERIOD}"
          --interval "${PREFETCH_INTERVAL}"

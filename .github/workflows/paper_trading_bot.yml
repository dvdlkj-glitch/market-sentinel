name: Paper Trading Bot

# 節奏 A: 美股收盤後決策。美股收盤 16:00 ET。
# GitHub Actions 用 UTC。美東收盤後 (考慮夏令/冬令) 約 UTC 21:00-22:00。
# 設在 UTC 22:30 跑 (美股收盤後、資料已定稿), 對應台北隔天 06:30。
# 下單為 market order (DAY), 會在「下一個交易日開盤」成交 → 符合節奏 A。
on:
  schedule:
    - cron: '37 22 * * 1-5'   # 週一到週五 UTC 22:37 = 美股收盤後 (避開半點)
  workflow_dispatch: {}        # 也允許手動觸發 (測試用)

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alpaca-py

      - name: Run paper trading bot
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          ALPACA_PAPER: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python paper_trading_bot.py

name: Prefetch Taiwan Official Snapshots

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: Optional comma-separated Taiwan tickers
        required: false
        type: string
  schedule:
    - cron: "18 8 * * 1-5"
    - cron: "48 10 * * 1-5"

jobs:
  prefetch-market:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_TAIWAN_OFFICIAL_SNAPSHOT_TABLE: ${{ vars.SUPABASE_TAIWAN_OFFICIAL_SNAPSHOT_TABLE }}
      TAIWAN_OFFICIAL_SNAPSHOT_TICKERS: ${{ github.event.inputs.tickers || vars.TAIWAN_OFFICIAL_SNAPSHOT_TICKERS }}
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prefetch Taiwan official macro snapshot
        run: >
          python scripts/prefetch_taiwan_official_snapshots.py --scope macro

  prefetch-tickers:
    needs: prefetch-market
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_TAIWAN_OFFICIAL_SNAPSHOT_TABLE: ${{ vars.SUPABASE_TAIWAN_OFFICIAL_SNAPSHOT_TABLE }}
      TAIWAN_OFFICIAL_SNAPSHOT_TICKERS: ${{ github.event.inputs.tickers || vars.TAIWAN_OFFICIAL_SNAPSHOT_TICKERS }}
      PREFETCH_SHARD_INDEX: ${{ matrix.shard_index }}
      PREFETCH_SHARD_COUNT: "8"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prefetch Taiwan official ticker snapshots
        run: |
          args=(--scope tickers)
          if [ -n "${PREFETCH_SHARD_INDEX}" ]; then
            args+=(--shard-index "${PREFETCH_SHARD_INDEX}")
          fi
          if [ -n "${PREFETCH_SHARD_COUNT}" ]; then
            args+=(--shard-count "${PREFETCH_SHARD_COUNT}")
          fi
          python scripts/prefetch_taiwan_official_snapshots.py "${args[@]}"
